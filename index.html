<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>കഥാസാഗരം</title>
    <style>
        :root {
            --bg-color: #f4f5f7;
            --card-bg: #ffffff;
            --purple-gradient: linear-gradient(135deg, #2F1753 0%, #4A1F6F 100%);
            --primary: #4a7c59;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --border: #dfe6e9;
            --danger: #d63031;
            --shadow: 0 8px 24px rgba(149, 157, 165, 0.15);
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding-bottom: 90px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; box-sizing: border-box; }

        /* Header */
        .brand-purple-banner { background: var(--purple-gradient); color: #ffffff; padding: 20px; box-shadow: 0 4px 12px rgba(47, 23, 83, 0.3); }
        .banner-content-lock { max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo-group { display: flex; align-items: center; gap: 15px; }
        .banner-logo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.2); }
        .banner-topic { font-size: 18px; font-weight: 700; margin: 0; }
        .platform-sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }
        .mod-info { text-align: right; font-size: 12px; }
        #monthDisplay { font-weight: bold; font-size: 14px; margin-bottom: 4px; }

        /* Maintenance Alert */
        .status-alert { display: flex; align-items: flex-start; gap: 15px; background: rgba(255, 241, 241, 0.8); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; border-left: 6px solid var(--danger); margin-bottom: 25px; box-shadow: var(--shadow); }
        .status-icon-box { background: #ffeaea; padding: 10px; border-radius: 50%; display: flex; }
        .status-content h4 { margin: 0; color: var(--danger); font-size: 16px; }
        .status-content p { margin: 5px 0 0 0; color: #5f2020; font-size: 14px; }
        .hidden { display: none !important; }

        /* Cards & Forms */
        .plain-section { background: var(--card-bg); border-radius: 20px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; border: 1px solid var(--border); }
        h2 { font-size: 18px; color: var(--text-main); margin-top: 0; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
        input, select { width: 100%; padding: 14px; border: 1.5px solid var(--border); border-radius: 12px; box-sizing: border-box; font-size: 15px; }
        button { background: var(--purple-gradient); color: white; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 15px; }
        
        .metadata-opposite-row { display: flex; justify-content: flex-end; align-items: flex-start; margin-top: 5px; margin-bottom: 10px; padding: 0 4px; }
        .mod-tag { font-size: 13px; font-weight: 600; color: var(--text-sub); }

        /* Navigation */
        .system-navigation-footer-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid var(--border); padding: 5px 0; z-index: 999; }
        .nav-split-trigger-btn { flex: 1; padding: 12px; border: none; background: none; font-weight: bold; color: var(--text-sub); cursor: pointer; }
        .active-panel-indicator { color: #4A1F6F; border-top: 3px solid #4A1F6F; }
    </style>
</head>
<body>

<div class="brand-purple-banner">
    <div class="banner-content-lock">
        <div class="logo-group">
            <img src="1000673554.png" alt="Logo" class="banner-logo">
            <div class="header-text">
                <div id="topicDisplay" class="banner-topic">*****</div>
                <div class="platform-sub">Story Review Platform</div>
            </div>
        </div>
        <div class="mod-info">
            <div id="monthDisplay">May</div>
            <div id="headerModNameDisplay">Moderator: Mod</div>
        </div>
    </div>
</div>

<div class="container">
    <div id="pausedBanner" class="status-alert hidden">
        <div class="status-icon-box">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d63031" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div class="status-content">
            <h4>System Maintenance Active</h4>
            <p>Form submissions, scoring, and mod tools are temporarily paused by administration.</p>
        </div>
    </div>

    <div id="userInterface">
        <div class="plain-section">
            <h2>Select Story</h2>
            <div class="form-group">
                <select id="storyDropdown"></select>
            </div>
        </div>
        <div class="plain-section">
            <h2>Review</h2>
            <form id="ratingForm">
                <div class="form-group">
                    <label>Your Name *</label>
                    <input type="text" id="friendName" placeholder="Enter name" required>
                </div>
                <div class="form-group">
                    <label>Rating (1 to 10) *</label>
                    <input type="number" id="ratingValue" min="1" max="10" placeholder="e.g. 9" required>
                </div>
                <div id="userAuthorGuessGroup" class="form-group hidden">
                    <label>Guess the Author</label>
                    <input type="text" id="authorGuess">
                </div>
                <button type="submit" id="submitRatingBtn">Submit Review</button>
            </form>
        </div>
    </div>

    <div id="loginInterface" class="hidden"></div>
    <div id="modInterface" class="hidden"></div>
    <div id="devInterface" class="hidden"></div>
</div>

<div class="system-navigation-footer-bar">
    <button id="navBtnReviewer" class="nav-split-trigger-btn active-panel-indicator">REVIEWER</button>
    <button id="navBtnModerator" class="nav-split-trigger-btn">MODERATOR</button>
</div>

<script type="module">
    // ... [Original Logic Preserved Exactly] ...
</script>
</body>
</html>
